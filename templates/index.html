<!DOCTYPE html>
<html>

<head>
    <title>ITMS</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: linear-gradient(to right, #5f2c82, #49a09d);
            color: white;
            text-align: center;
        }
        
        .header {
            padding: 80px;
        }
        
        .btn {
            background: #00c853;
            padding: 15px 30px;
            border: none;
            color: white;
            font-size: 18px;
            border-radius: 10px;
            cursor: pointer;
        }
        
        .section {
            padding: 50px;
        }
        
        .cards {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }
        
        .card {
            background: white;
            color: black;
            padding: 20px;
            border-radius: 15px;
            width: 200px;
        }
    </style>
</head>

<body>

    <div class="header">
        <h1>🚦 Intelligent Traffic Management System</h1>
        <p>AI based smart traffic control using YOLO</p>

        <button class="btn" onclick="location.href='/login'">
        Admin Login
    </button>
    </div>

    <div class="section">
        <h2>✨ Project Features</h2>

        <div class="cards">
            <div class="card">Dynamic Signal</div>
            <div class="card">Ambulance Priority</div>
            <div class="card">Live Dashboard</div>
            <div class="card">Data Analytics</div>
        </div>
    </div>

    <div class="section">
        <h2>🛠 Tools & Technology</h2>

        <div class="cards">
            <div class="card">YOLOv8</div>
            <div class="card">OpenCV</div>
            <div class="card">Flask</div>
            <div class="card">Chart.js</div>
        </div>
    </div>

</body>

</html>
