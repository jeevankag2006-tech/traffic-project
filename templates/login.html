<!DOCTYPE html>
<html>

<head>
    <title>Login</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: linear-gradient(to right, #141e30, #243b55);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
        }
        
        .box {
            background: white;
            color: black;
            padding: 40px;
            border-radius: 15px;
            text-align: center;
            width: 300px;
        }
        
        input {
            width: 90%;
            padding: 10px;
            margin: 10px;
            border-radius: 8px;
            border: 1px solid gray;
        }
        
        button {
            background: #00c853;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <div class="box">
        <h2>🔐 Admin Login</h2>

        <form method="POST">
            <input type="text" name="username" placeholder="Username"><br>
            <input type="password" name="password" placeholder="Password"><br>
            <button type="submit">Login</button>
        </form>
    </div>

</body>

</html>
